# Single-service deployment. The Go app serves the SPA and the API on :8080,
# so there's exactly one thing for Coolify to route the domain to — which is
# what keeps deploys from intermittently 404ing.
#
# In Coolify: point https://gitmark.joaovrmoraes.dev at the `app` service,
# container port 8080.
services:
  app:
    build: .
    environment:
      PORT: "8080"
      WEB_DIR: /web
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      OAUTH_SCOPE: ${OAUTH_SCOPE:-read:user repo}
      SERVICE_FQDN_APP_8080: https://gitmark.joaovrmoraes.dev
    expose:
      - "8080"
    restart: unless-stopped
