# Single-domain deployment: the `web` (nginx) serves the SPA and reverse-proxies
# /auth, /proxy, /me, /healthz to the `api`. Point your domain at `web` (port 80);
# Coolify terminates TLS and forwards X-Forwarded-Proto=https.
services:
  api:
    build: ./backend
    environment:
      PORT: "8080"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      OAUTH_SCOPE: ${OAUTH_SCOPE:-read:user repo}
    expose:
      - "8080"
    restart: unless-stopped

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "3000:80"
    restart: unless-stopped
