# Single-domain deployment on Coolify.
#
# The `web` (nginx) serves the SPA and reverse-proxies /auth, /proxy, /me and
# /healthz to the internal `api`. Only `web` is exposed publicly — the domain
# is pinned to it via Coolify's SERVICE_FQDN_* convention, so the bare domain
# always hits nginx (which serves index.html), never the Go backend directly.
services:
  api:
    build: ./backend
    environment:
      PORT: "8080"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      OAUTH_SCOPE: ${OAUTH_SCOPE:-read:user repo}
    expose:
      - "8080"
    restart: unless-stopped

  web:
    build: ./frontend
    environment:
      # Coolify pins the public domain to THIS service, on its port 80.
      SERVICE_FQDN_WEB_80: https://gitmark.joaovrmoraes.dev
    depends_on:
      - api
    expose:
      - "80"
    restart: unless-stopped
