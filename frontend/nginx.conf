server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── API: same-origin reverse proxy to the Go backend ──
  # Single-domain setup → cookies stay SameSite=Lax, no CORS needed.
  location ~ ^/(auth|proxy|me|healthz) {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Lets the backend know the original scheme so it sets Secure cookies
    # and builds the right OAuth callback URL.
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  # ── SPA ──
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Never cache the service worker or the shell
  location = /sw.js { add_header Cache-Control "no-cache"; }
  location = /index.html { add_header Cache-Control "no-cache"; }
}
